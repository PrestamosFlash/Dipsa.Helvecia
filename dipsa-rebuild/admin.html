<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dipsa Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-body">
  <header class="topbar">
    <div class="brand">
      <img src="assets/logo.jpg" alt="Logo Dipsa" class="logo">
      <div>
        <h1>Admin Dipsa</h1>
        <p>Panel conectado a Supabase</p>
      </div>
    </div>
    <div class="admin-top-actions">
      <a href="index.html" class="small-btn ghost" style="text-decoration:none">Ver tienda</a>
    </div>
  </header>

  <main class="admin-shell">

    <div id="adminShell">
      <section class="card white">
        <div class="admin-section-head">
          <h2 class="admin-title">Ajustes generales</h2>
          <div class="chips compact-actions">
            <button id="reloadAdmin" class="chip" type="button">Recargar</button>
            <button id="saveAdmin" class="chip active" type="button">Guardar cambios</button>
          </div>
        </div>

        <div class="form-grid">
          <label>Nombre del negocio<input id="businessName"></label>
          <label>Frase corta<input id="businessTagline"></label>
          <label>WhatsApp<input id="businessWhatsapp"></label>
          <label>Teléfono visible<input id="businessPhoneDisplay"></label>
          <label>Mensaje delivery<input id="deliveryMessage"></label>
          <label>Costo delivery<input id="deliveryFee" type="number"></label>
          <label>Título del bloque de promos<input id="promoHeadlineInput"></label>
          
        </div>

        <div class="form-grid" style="margin-top:12px">
          <label>Logo URL o dataURL<input id="logoUrl"></label>
          <label>Hero URL o dataURL<input id="heroUrl"></label>
        </div>

        <div class="form-grid" style="margin-top:12px">
          <label>Subir logo<input id="logoFile" type="file" accept="image/*"></label>
          <label>Subir hero<input id="heroFile" type="file" accept="image/*"></label>
        </div>
      </section>

      <section class="card white">
        <h2 class="admin-title">Estado del local</h2>
        <div class="chips">
          <button id="storeOpenBtn" class="chip active" type="button">Abierto</button>
          <button id="storeClosedBtn" class="chip" type="button">Cerrado</button>
        </div>
      </section>

      <section class="card white">
        <div class="admin-section-head">
          <h2 class="admin-title">Promos del día</h2>
          <button id="addDailyPromo" class="small-btn" type="button">Agregar promo</button>
        </div>
        <div id="dailyPromoEditor" class="admin-list"></div>
      </section>

      <section class="card white">
        <div class="admin-section-head">
          <h2 class="admin-title">Promos generales</h2>
          <button id="addGeneralPromo" class="small-btn" type="button">Agregar promo</button>
        </div>
        <div id="generalPromoEditor" class="admin-list"></div>
      </section>

      <section class="card white">
        <h2 class="admin-title">Productos</h2>
        <div id="productEditor" class="admin-list"></div>
      </section>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="shared.js"></script>
  <script src="admin.js"></script>
</body>
</html>
